# Vale configuration for VillageSQL docs.
# Self-contained: Vale's built-in Spelling check plus the VillageSQL voice
# style. No external Packages, so no `vale sync` is required
# in CI — the config is fully reproducible from this repo.
#
# The VillageSQL vocabulary (styles/config/vocabularies/VillageSQL/accept.txt)
# teaches Vale.Spelling the domain terms (mysql, VDF, binlog, vsql_* functions,
# competitor/tool names) so they are not flagged as misspellings.

StylesPath = styles
MinAlertLevel = suggestion

Vocab = VillageSQL

[*.mdx]
BasedOnStyles = Vale, VillageSQL

# The vocabulary is for spelling-accept only. Disable Vale.Terms: it would
# otherwise treat each accept.txt entry's casing as canonical and flag every
# other casing — and this list is auto-extracted, so its casing isn't a
# curated source of truth. (Casing enforcement could be added later with a
# hand-curated term list: VillageSQL, MySQL, CMake, ...)
Vale.Terms = NO

# Vale.Repetition only false-positives here on SQL/IPv6 syntax that reads as a
# doubled word ("type TYPE", "x.x") and would nag on every uninstall page.
# Disabled so the CI Warning stays high-signal; re-enable if real "the the"
# typos become a concern.
Vale.Repetition = NO
